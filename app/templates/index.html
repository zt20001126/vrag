<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vision RAG</title>
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div>
          <p class="eyebrow">Visual RAG Workspace</p>
          <h1>设计师风格检索与图像生成</h1>
          <p class="subtitle">上传参考图，输入风格需求，先跑通视觉 RAG 的核心交互链路。</p>
        </div>
        <div class="status-pill" id="healthStatus">Checking</div>
      </section>

      <section class="workspace">
        <aside class="panel upload-panel">
          <div class="panel-heading">
            <span class="step">01</span>
            <div>
              <h2>图片上传</h2>
              <p>保存图片并返回后端文件路径。</p>
            </div>
          </div>

          <label class="dropzone" for="imageInput">
            <input id="imageInput" type="file" accept="image/*" />
            <span class="drop-icon">+</span>
            <span class="drop-title">选择一张设计参考图</span>
            <span class="drop-meta">PNG / JPG / WEBP</span>
          </label>

          <div class="preview" id="previewBox">
            <span>预览区域</span>
          </div>

          <button class="primary-btn" id="uploadBtn" type="button">上传图片</button>
          <pre class="result-box" id="uploadResult">{}</pre>
        </aside>

        <section class="panel chat-panel">
          <div class="panel-heading">
            <span class="step">02</span>
            <div>
              <h2>RAG 对话检索</h2>
              <p>用自然语言描述你想找的设计风格。</p>
            </div>
          </div>

          <div class="chat-window" id="chatWindow">
            <div class="message assistant">
              <strong>Vision RAG</strong>
              <span>可以输入“极简海报、黑白排版、工业设计风格”等查询词，我会返回 mock 检索结果。</span>
            </div>
          </div>

          <form class="chat-form" id="searchForm">
            <input id="queryInput" type="text" placeholder="输入检索需求，例如：极简产品海报" required />
            <input id="designerInput" type="text" placeholder="设计师 ID，可选" />
            <button type="submit">检索</button>
          </form>
        </section>

        <aside class="panel generate-panel">
          <div class="panel-heading">
            <span class="step">03</span>
            <div>
              <h2>图像生成</h2>
              <p>当前返回 mock 生成结果。</p>
            </div>
          </div>

          <form class="generate-form" id="generateForm">
            <textarea id="promptInput" rows="6" placeholder="输入生成提示词，例如：A minimal furniture poster with soft shadows" required></textarea>
            <input id="generateDesignerInput" type="text" placeholder="设计师 ID，可选" />
            <button class="primary-btn" type="submit">生成图片</button>
          </form>

          <div class="generated-card" id="generatedCard">
            <div class="generated-placeholder">Mock Image</div>
            <p id="generatedText">等待生成请求</p>
          </div>
        </aside>
      </section>
    </main>

    <script src="/static/js/app.js"></script>
  </body>
</html>
