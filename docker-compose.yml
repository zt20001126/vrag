services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: vision-rag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vision_rag
      POSTGRES_PASSWORD: vision_rag_password
      POSTGRES_DB: vision_rag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vision_rag -d vision_rag"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
